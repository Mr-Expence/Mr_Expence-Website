<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Mr_Expence's Server</title>
  <link rel="icon" type="image/x-icon"
    href="https://cdn.prod.website-files.com/6257adef93867e50d84d30e2/66e3d80db9971f10a9757c99_Symbol.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f13;
      --bg2: #16171f;
      --bg3: #1c1d2b;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(100, 108, 255, 0.25);
      --text: #e4e6f0;
      --muted: #6b7280;
      --dim: #3d4050;
      --accent: #5865f2;
      --accent2: #818cf8;
      --accent-bg: rgba(88, 101, 242, 0.12);
      --green: #23a559;
      --radius: 16px;
      --font: "DM Sans", sans-serif;
      --mono: "DM Mono", monospace;
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px 64px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient glow layers */
    .glow-top {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(ellipse,
          rgba(88, 101, 242, 0.13) 0%,
          transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .glow-bottom {
      position: fixed;
      bottom: -180px;
      right: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse,
          rgba(129, 140, 248, 0.07) 0%,
          transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid texture overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ---------- Layout ---------- */
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 460px;
    }

    /* ---------- Top brand link ---------- */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.05s forwards;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: -0.01em;
      font-family: var(--mono);
    }

    .brand-name span {
      color: var(--accent2);
    }

    .brand:hover .brand-name {
      color: var(--text);
    }

    /* ---------- Header text ---------- */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--accent-bg);
      border: 1px solid var(--border2);
      color: var(--accent2);
      font-size: 11.5px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s forwards;
    }

    .badge-pulse {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      position: relative;
    }

    .badge-pulse::after {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.3;
      animation: pulse 2s ease infinite;
    }

    .heading {
      font-size: clamp(28px, 6vw, 38px);
      font-weight: 700;
      text-align: center;
      line-height: 1.18;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.15s forwards;
    }

    .heading em {
      font-style: normal;
      background: linear-gradient(130deg, #818cf8 20%, #5865f2 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: 14.5px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 340px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    /* ---------- Discord bubble card ---------- */
    .card {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.55s ease 0.28s forwards;
    }

    /* Card top accent line */
    .card::before {
      content: "";
      display: block;
      height: 2px;
      background: linear-gradient(90deg,
          transparent 0%,
          var(--accent) 40%,
          var(--accent2) 60%,
          transparent 100%);
    }

    .card-inner {
      padding: 26px 26px 24px;
    }

    /* Server header */
    .server-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .server-icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: var(--bg);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .server-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .server-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .verified {
      display: inline-flex;
      align-items: center;
      background: var(--accent-bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--accent2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .server-desc {
      font-size: 13px;
      color: var(--muted);
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 18px;
      margin-bottom: 20px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
    }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-dot.online {
      background: var(--green);
      box-shadow: 0 0 6px rgba(35, 165, 89, 0.4);
    }

    .stat-dot.offline {
      background: #4e5160;
    }

    .stat b {
      color: #c4c7d0;
      font-weight: 600;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    /* Channel list */
    .channels-label {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: var(--mono);
    }

    .channels {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 22px;
    }

    .channel {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: 9px;
      font-size: 13.5px;
      color: var(--muted);
      cursor: default;
      transition:
        background 0.12s,
        color 0.12s;
    }

    .channel:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #c4c7d0;
    }

    .channel.active {
      background: rgba(88, 101, 242, 0.15);
      color: var(--text);
    }

    .ch-icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .channel.active .ch-icon {
      opacity: 1;
      color: var(--accent2);
    }

    .ch-name {
      flex: 1;
    }

    .ch-new {
      font-size: 10px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* Join button */
    .join-btn {
      width: 100%;
      padding: 13px 20px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font);
      letter-spacing: -0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition:
        background 0.15s,
        transform 0.1s,
        box-shadow 0.15s;
      text-decoration: none;
    }

    .join-btn:hover {
      background: #4752c4;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(88, 101, 242, 0.35);
    }

    .join-btn:active {
      transform: scale(0.99);
      box-shadow: none;
    }

    .discord-icon {
      width: 20px;
      height: 20px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* Footer */
    .card-footer {
      text-align: center;
      padding: 14px 26px 18px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--dim);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .card-footer a {
      color: var(--dim);
      text-decoration: none;
      transition: color 0.12s;
    }

    .card-footer a:hover {
      color: var(--accent2);
    }

    .dot-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--dim);
    }

    /* Keyframes */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.3;
      }

      50% {
        transform: scale(2.2);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  </div>
