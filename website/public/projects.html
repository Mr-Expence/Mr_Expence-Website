    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f13;
        --bg2: #16171f;
        --bg3: #1c1d2b;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(100, 108, 255, 0.25);
        --text: #e4e6f0;
        --muted: #6b7280;
        --dim: #3d4050;
        --accent: #5865f2; /* Discord */
        --accent2: #e0e3ff; /* White */
        --accent3: #ff0000; /* Youtube */
        --accent4: #9146ff; /* Twitch */
        --accent5: #00af5c; /* Modrinth */
        --accent6: #f16436; /* Curseforge */
        --accent7: #3094ff; /* Github */
        --accent8: #fdd927; /* Github Stars */
        --accent9: #000000; /* X */
        --accent10: #ff0069; /* Instagram */
        --accent11: #52a7e7; /* Twitter */
        --accent12: #ff4500; /* Reddit */
        --accent13: #26a5e4; /* Telegram */

        --accent-bg: rgba(88, 101, 242, 0.12);
        --green: #23a559;
        --red: #ff0000;
        --purple: #9146ff;
        --radius: 16px;
        --font: "DM Sans", sans-serif;
        --mono: "DM Mono", monospace;
      }

      html,
      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: var(--font);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 20px 64px;
        position: relative;
        overflow-x: hidden;
      }

      /* Ambient glow layers */
      .glow-top {
        position: fixed;
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        width: 700px;
        height: 700px;
        background: radial-gradient(
          ellipse,
          rgba(0, 175, 92, 0.13) 0%,
          transparent 65%
        );
        pointer-events: none;
        z-index: 0;
      }

      .glow-bottom {
        position: fixed;
        bottom: -180px;
        right: -100px;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          ellipse,
          rgba(0, 175, 92, 0.07) 0%,
          transparent 65%
        );
        pointer-events: none;
        z-index: 0;
      }

      /* Grid texture overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      /* ---------- Layout ---------- */
      .wrapper {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 1160px;
      }

      .cards-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 24px;
        width: 100%;
        justify-items: center;
      }

      .card,
      .card-sub,
      .card-twi,
      .card-modrinth,
      .card-curseforge,
      .card-github {
        width: 100%;
        min-width: 320px;
        max-width: 380px;
      }

      /* ---------- Top brand link ---------- */
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        margin-bottom: 36px;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.05s forwards;
      }

      .brand img {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        object-fit: cover;
      }

      .brand-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: -0.01em;
        font-family: var(--mono);
      }

      .brand-name span {
        color: var(--accent2);
      }

      .brand:hover .brand-name {
        color: var(--text);
      }

      /* ---------- Header text ---------- */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--accent-bg);
        border: 1px solid var(--border2);
        color: var(--accent2);
        font-size: 11.5px;
        font-weight: 600;
        padding: 5px 14px;
        border-radius: 20px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 18px;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.1s forwards;
      }

      .badge-pulse {
        width: 6px;
        height: 6px;
        background: var(--accent);
        border-radius: 50%;
        position: relative;
      }

      .badge-pulse::after {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.3;
        animation: pulse 2s ease infinite;
      }

      .heading {
        font-size: clamp(28px, 6vw, 38px);
        font-weight: 700;
        text-align: center;
        line-height: 1.18;
        letter-spacing: -0.03em;
        margin-bottom: 10px;
        color: var(--text);
        opacity: 0;
        animation: fadeUp 0.5s ease 0.15s forwards;
      }

      .heading em {
        font-style: normal;
        background: linear-gradient(30deg, #22ff84 20%, #134229 80%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .sub {
        font-size: 14.5px;
        color: var(--muted);
        text-align: center;
        line-height: 1.6;
        max-width: 340px;
        margin-bottom: 36px;
        opacity: 0;
        animation: fadeUp 0.5s ease 0.2s forwards;
      }

      /* ---------- Discord bubble card ---------- */
      .card {
        width: 100%;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 0.55s ease 0.28s forwards;
      }

      /* Card top accent line */
      .card::before {
        content: "";
        display: block;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--accent) 40%,
          var(--accent) 60%,
          transparent 100%
        );
      }

      .card-inner {
        padding: 26px 26px 24px;
      }

      /* Server header */
      .server-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 22px;
      }

      .server-icon {
        width: 60px;
        height: 60px;
        border-radius: 18px;
        background: var(--bg);
        border: 1px solid var(--border);
        overflow: hidden;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }

      .server-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .server-name {
        font-size: 17px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .verified {
        display: inline-flex;
        align-items: center;
        background: var(--accent-bg);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 10.5px;
        font-weight: 600;
        color: var(--accent2);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-family: var(--mono);
      }

      .server-desc {
        font-size: 13px;
        color: var(--muted);
      }

      /* Stats */
      .stats {
        display: flex;
        gap: 18px;
        margin-bottom: 20px;
      }

      .stat {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        color: var(--muted);
      }

      .stat-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .stat-dot.online {
        background: var(--green);
        box-shadow: 0 0 6px rgba(35, 165, 89, 0.4);
      }

      .stat-dot.subscribe {
        background: var(--red);
        box-shadow: 0 0 6px rgba(165, 35, 35, 0.4);
      }

      .stat-dot.follow {
        background: var(--purple);
        box-shadow: 0 0 6px rgba(145, 70, 255, 0.4);
      }

      .stat-dot.offline {
        background: #4e5160;
      }

      .stat-dot.modrinth {
        background: var(--accent5);
        box-shadow: 0 0 6px rgba(29, 161, 242, 0.35);
      }

      .stat-dot.curseforge {
        background: var(--accent6);
        box-shadow: 0 0 6px rgba(225, 48, 108, 0.35);
      }

      .stat-dot.github {
        background: var(--accent8);
        box-shadow: 0 0 6px rgba(46, 45, 36, 0.35);
      }

      .stat b {
        color: #c4c7d0;
        font-weight: 600;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 18px 0;
      }

      /* Channel list */
      .channels-label {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 8px;
        font-family: var(--mono);
      }

      .channels {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 22px;
      }

      .channel {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 10px;
        border-radius: 9px;
        font-size: 13.5px;
        color: var(--muted);
        cursor: default;
        transition:
          background 0.12s,
          color 0.12s;
      }

      .channel:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #c4c7d0;
      }

      .channel.active {
        background: rgba(88, 101, 242, 0.15);
        color: var(--text);
      }

      .ch-icon {
        font-size: 14px;
        width: 18px;
        text-align: center;
        flex-shrink: 0;
        opacity: 0.6;
      }

      .channel.active .ch-icon {
        opacity: 1;
        color: var(--accent2);
      }

      .ch-name {
        flex: 1;
      }

      .ch-new {
        font-size: 10px;
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 1px 7px;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

        font-size: 15px;

        justify-content: center;
        gap: 10px;
        transition:

          transform 0.1s,
          box-shadow 0.15s;
        text-decoration: none;
      }

      .join-btn:hover {
        background: #5865f2;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(88, 101, 242, 0.35);
      }

      .join-btn:active {
        transform: scale(0.99);
        box-shadow: none;
      }

      .card-footer a:hover {
        color: var(--accent2);
      }

      .dot-sep {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--dim);
      }

      /* Keyframes */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.3;
        }

        50% {
          transform: scale(2.2);
          opacity: 0;
        }
      }
      /* ── Reset ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #fff;
        color: #1a1a1a;
        padding: 2rem;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1b1b1f;
          color: #e0e0e0;
        }
      }

      /* ════════════════════════════════
       FULL CARD
    ════════════════════════════════ */
      .mr-card {
        display: grid;
        grid-template-columns: auto 1fr;
        width: 100%;
        gap: 14px;
        align-items: flex-start;
        padding: 16px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        background: #fff;
        text-decoration: none;
        color: inherit;
        transition:
          border-color 0.2s,
          background 0.2s;
        animation: fadeUp 2s ease 0.0005s forwards;
        max-width: 100%; 
      }
      @media (prefers-color-scheme: dark) {
        .mr-card {
          background: #1e1e22;
          border-color: rgba(255, 255, 255, 0.12);
        }
      }
      .mr-card:hover {
        border-color: #1bd96a;
      }

      .mr-icon {
        width: 56px;
        height: 56px;
        flex-shrink: 0;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        overflow: hidden;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      @media (prefers-color-scheme: dark) {
        .mr-icon {
          background: #2a2a30;
          border-color: rgba(255, 255, 255, 0.1);
        }
      }
      .mr-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .mr-icon-fallback {
        font-size: 22px;
        font-weight: 600;
        color: #999;
      }

      .mr-body {
        flex: 1;
        min-width: 0;
      }

      .mr-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }
      .mr-title {
        font-size: 15px;
        font-weight: 600;
      }
      .mr-author {
        font-size: 12px;
        color: #888;
      }

      .mr-desc {
        font-size: 13px;
        color: #666;
        line-height: 1.5;
        margin-bottom: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      @media (prefers-color-scheme: dark) {
        .mr-desc {
          color: #aaa;
        }
      }

      .mr-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .mr-stat {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: #666;
      }
      @media (prefers-color-scheme: dark) {
        .mr-stat {
          color: #aaa;
        }
      }
      .mr-stat svg {
        width: 13px;
        height: 13px;
        opacity: 0.6;
      }

      .mr-tag {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 99px;
        background: #f0f0f0;
        color: #555;
        border: 1px solid rgba(0, 0, 0, 0.08);
        text-transform: capitalize;
      }
      @media (prefers-color-scheme: dark) {
        .mr-tag {
          background: #2a2a30;
          color: #bbb;
          border-color: rgba(255, 255, 255, 0.08);
        }
      }
      .modrinth-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        width: 100%;
        max-width: calc(320px * 3 + 24px * 2); /* matches 3-col cards-grid */
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 24px;
        width: 100%;
        justify-items: center;
      }
    </style>
  </head>

  <body>

    <!-- Modrinth Projects -->

    <script>
      const setCountText = (id, value) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = value;
      };

      const formatCount = (value) =>
        value == null ? "N/A" : value.toLocaleString();
      // Modrinth
      fetch("https://api.modrinth.com/v2/user/Mr_Expence/projects")
        .then((res) => {
          if (!res.ok) throw new Error("Modrinth fetch failed");
          return res.json();
        })
        .then((projects) => {
          const downloads = projects.reduce(
            (sum, project) => sum + (project.downloads || 0),
            0,
          );
          setCountText("modrinth-count", formatCount(downloads));
        })
        .catch(() => setCountText("modrinth-count", "N/A"));
      // Github
      fetch("https://api.github.com/users/Mr-Expence/repos?per_page=100")
        .then((res) => {
          if (!res.ok) throw new Error("GitHub fetch failed");
          return res.json();
        })
        .then((repos) => {
          const stars = repos.reduce(
            (sum, repo) => sum + (repo.stargazers_count || 0),
            0,
          );
          setCountText("github-count", formatCount(stars));
        })
        .catch(() => setCountText("github-count", "N/A"));
      // CurseForge
      setCountText("curseforge-count", "N/A");
      // Discord
      fetch("https://discord.com/api/guilds/1377934065025679380/widget.json")
        .then((res) => {
          if (!res.ok) throw new Error("Widget not enabled or bad ID");
          return res.json();
        })
        .then((data) => {
          document.getElementById("discord-count").textContent =
            data.presence_count - 3;
        })
        .catch(() => {
          document.getElementById("discord-count").textContent = "N/A";
        });
      // Youtube
      fetch(
        "https://mixerno.space/api/youtube-channel-counter/user/UCq9MzduXHZDplR16h1upgcQ",
      )
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("yt-subs").textContent = data.counts[0].count;
        })
        .catch(() => {
          document.getElementById("yt-subs").textContent = "N/A";
        });
      // Twitch
      fetch("https://decapi.me/twitch/followcount/mrexpence")
        .then((res) => res.text())
        .then((count) => {
          document.getElementById("follower-count").textContent = count;
        })
        .catch(() => {
          document.getElementById("follower-count").textContent = "N/A";
        });
      // Instagram
      fetch("https://www.instagram.com/YOUR_USERNAME/?__a=1&__d=dis")
        .then((res) => res.json())
        .then((data) => {
          setCountText(
            "instagram-count",
            formatCount(data.graphql?.user?.edge_followers?.count),
          );
        })
        .catch(() => setCountText("instagram-count", "N/A"));

      // Twitter/X
      setCountText("twitter-count", "N/A");

      // Reddit
      fetch("https://www.reddit.com/user/YOUR_USERNAME/about.json")
        .then((res) => res.json())
        .then((data) => {
          setCountText("reddit-count", formatCount(data.data?.total_karma));
        })
        .catch(() => setCountText("reddit-count", "N/A"));

      // Telegram
      setCountText("telegram-count", "N/A");
      const UA = "Mr-Expence/vitepress-site";


      // ── Full cards ──
      async function fetchProject(slug) {
        const res = await fetch(`https://api.modrinth.com/v2/project/${slug}`, {
          headers: { "User-Agent": UA },
        });
        return res.json();
      }

      function formatNum(n) {
        if (!n) return "0";
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
        if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
        return n.toLocaleString();
      }


      document.querySelectorAll(".mr-card[data-slug]").forEach(async (el) => {
        const { slug, type, author } = el.dataset;
        el.href = `https://mr-expence.github.io/projects/${slug}`;
        try {
          const d = await fetchProject(slug);
          if (d.icon_url) {
            el.querySelector(".mr-icon").innerHTML =
              `<img src="${d.icon_url}" alt="${d.title}">`;
          } else {
            el.querySelector(".mr-icon-fallback").textContent =
              d.title?.[0] ?? "?";
          }
          el.querySelector(".mr-title").textContent = d.title;
          el.querySelector(".mr-author").textContent = author
            ? `by ${author}`
            : "";
          el.querySelector(".mr-desc").textContent = d.description;
          el.querySelector(".mr-meta").innerHTML = `
          <span class="mr-stat">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="h-6 w-6 text-secondary"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1m-4-4-4 4m0 0-4-4m4 4V4"></path></svg>
            ${formatNum(d.downloads)} downloads
          </span>
          <span class="mr-stat">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="h-6 w-6 text-secondary"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 0 0 0 6.364L12 20.364l7.682-7.682a4.5 4.5 0 0 0-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 0 0-6.364 0"></path></svg>
            ${formatNum(d.followers)} followers
          </span>
          ${(d.categories ?? [])
            .slice(0, 2)
            .map((c) => `<span class="mr-tag">${c}</span>`)
            .join("")}
        `;
        } catch (e) {
          el.querySelector(".mr-title").textContent = slug;
        }
      });
    </script>
