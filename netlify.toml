[build]
  # We explicitly run npm install first to be safe,
  # then use npx to invoke vitepress — npx runs it through
  # Node directly, bypassing the Linux execute-permission issue
  # that was causing "Permission denied" on the binary file.
  command = "npm install && npx vitepress build website"

  # Your VitePress source is in the "website" folder, so
  # the compiled output lands here:
  publish = "website/.vitepress/dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "development"