[build]
  # Instead of asking the OS to execute the vitepress binary (which fails
  # due to missing execute permissions on Netlify's Linux environment),
  # we call Node.js directly and point it at the VitePress CLI entry point.
  # This is equivalent to running "vitepress build website" but bypasses
  # the filesystem permission check entirely.
  command = "node ./node_modules/vitepress/bin/vitepress.js build website"

  # VitePress compiles your "website" source folder and outputs here:
  publish = "website/.vitepress/dist"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "development"